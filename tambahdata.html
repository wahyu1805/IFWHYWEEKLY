<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Data Mahasiswa | INFORMATIKA</title>
    <link rel="stylesheet" href="tambahdata.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Home</a>
            <a href="profil.html">Profile</a>
            <a href="contact.html">Contact</a>
            <a href="identitasmahasiswa.html">Data Mahasiswa</a>
            <a href="tambahdata.html">Tambah Data</a>
        </nav>
    </header>

    <main>
        <h2>TAMBAH DATA MAHASISWA</h2>
        <form id="studentForm">
            <label for="nama">Nama:</label>
            <input type="text" id="nama" name="nama" required>

            <label for="nim">NIM:</label>
            <input type="text" id="nim" name="nim" required>

            <label for="jurusan">Jurusan:</label>
            <input type="text" id="jurusan" name="jurusan" required>

            <label for="foto">Foto:</label>
            <input type="file" id="foto" name="foto" accept="image/*" required>
            <img id="fotoPreview">

            <input type="submit" value="Tambah Data">
        </form>

        <a href="identitasmahasiswa.html" class="back-link">Kembali ke Data Mahasiswa</a>
    </main>

    <script>
        const form = document.getElementById('studentForm');
        const fotoInput = document.getElementById('foto');
        const preview = document.getElementById('fotoPreview');

        fotoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (!form.checkValidity()) {
                alert('Mohon isi semua field!');
                return;
            }

            const file = fotoInput.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const student = {
                    foto: e.target.result, // base64
                    nama: document.getElementById('nama').value,
                    nim: document.getElementById('nim').value,
                    jurusan: document.getElementById('jurusan').value
                };

                let students = JSON.parse(localStorage.getItem('mahasiswaData')) || [];
                students.push(student);
                localStorage.setItem('mahasiswaData', JSON.stringify(students));

                alert('Data mahasiswa berhasil ditambahkan!');
                form.reset();
                preview.style.display = 'none';
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
