<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Data | INFORMATIKA 2026</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box; }
        input[type="submit"] { background: #4CAF50; color: white; padding: 12px; border: none; cursor: pointer; font-size: 16px; }
        input[type="submit"]:hover { background: #45a049; }
        #fotoPreview { max-width: 200px; max-height: 200px; margin-top: 10px; }
        a { display: inline-block; margin-top: 20px; color: #0066cc; text-decoration: none; }
    </style>
</head>
<body>
    <h2>TAMBAH DATA MAHASISWA</h2>
    <form id="studentForm">
        <label for="nama">Nama:</label>
        <input type="text" id="nama" name="nama" required>

        <label for="nim">NIM:</label>
        <input type="text" id="nim" name="nim" required>

        <label for="jurusan">Jurusan:</label>
        <input type="text" id="jurusan" name="jurusan" required>

        <label for="foto">Foto:</label>
        <input type="file" id="foto" name="foto" accept="image/*" required>
        <img id="fotoPreview" style="display:none;">

        <input type="submit" value="Tambah Data">
    </form>

    <a href="identitasmahasiswa.html">BACK</a>

    <script>
        const form = document.getElementById('studentForm');
        const fotoInput = document.getElementById('foto');
        const preview = document.getElementById('fotoPreview');

        fotoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (!form.checkValidity()) {
                alert('Mohon isi semua field!');
                return;
            }

            const file = fotoInput.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const student = {
                    foto: e.target.result, // base64
                    nama: document.getElementById('nama').value,
                    nim: document.getElementById('nim').value,
                    jurusan: document.getElementById('jurusan').value
                };

                let students = JSON.parse(localStorage.getItem('mahasiswaData')) || [];
                students.push(student);
                localStorage.setItem('mahasiswaData', JSON.stringify(students));

                alert('Data mahasiswa berhasil ditambahkan!');
                form.reset();
                preview.style.display = 'none';
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
